<p>{{data.titulo}}</p>

<div [formGroup]="form">
    <div class="container">
        <div class="row">
            <div class="col-4">
                <mat-form-field class="w-100" appearance="fill">
                    <mat-label>Nombre</mat-label>
                    <input matInput placeholder="Dolar" #input formControlName="nombre" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
        </div>
    </div>
</div>

<div class="botonera">
    <button (click)="onAceptClick()"> <mat-icon>close</mat-icon> Cerrar</button>
    <button mat-button color="primary" (click)="buscar()"> <mat-icon>search</mat-icon> Buscar</button>
</div>

<div #tableContainer class="container table-container">
        <table mat-table [dataSource]="dataSource.results" class="mat-elevation-z8"  *ngIf="dataSource.results" >
            <ng-container matColumnDef="monedacod">
                <th mat-header-cell *matHeaderCellDef style="width:20%" class="text-center">Código</th>
                <td mat-cell *matCellDef="let element" class="text-center">{{element.moneda}}</td>
            </ng-container>
            <ng-container matColumnDef="monedanombre">
                <th mat-header-cell *matHeaderCellDef>Nombre</th>
                <td mat-cell *matCellDef="let element">{{element.nombre}}</td>
            </ng-container>
            <ng-container matColumnDef="estatus">
                <th mat-header-cell *matHeaderCellDef class="text-center">Activo</th>
                <td mat-cell *matCellDef="let element" class="text-center">{{element.activo}}</td>
            </ng-container>


            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onSelectRowClick(row)"></tr>
        </table>
</div>


<mat-paginator  [length]="dataSource.total_registros" 
                [pageSize]="dataSource.registros_x_pagina" 
                [nextPageLabel]="'Siguiente'"
                (page)="onPageChange($event)"
                *ngIf="dataSource.results">
</mat-paginator>


<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
