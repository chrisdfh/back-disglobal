<p>{{data.titulo}}</p>

<div [formGroup]="form">
    <div class="container">
        <div class="row px-2">
            <div class="col-6 p-1">
                <mat-form-field appearance="fill">
                    <mat-label>ID Plan</mat-label>
                    <input matInput placeholder="Ej. Carlos" formControlName="id_plan" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class="col-6 p-1">
                <mat-form-field appearance="fill">
                    <mat-label>Nombre Plan</mat-label>
                    <input matInput placeholder="Ej. Distribuidora" #inputNombre formControlName="nombre" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
        </div>
    </div>
</div>
<div class="botonera">
    <button (click)="onAceptClick()"> <mat-icon>close</mat-icon> Cerrar</button>
    <button mat-button color="primary" (click)="buscar()"> <mat-icon>search</mat-icon> Buscar</button>
</div>
<div #tableContainer class="container table-container multiple-buttons" >
    <table mat-table [dataSource]="dataSource.results" class="mat-elevation-z8" *ngIf="dataSource.results" >
        <ng-container matColumnDef="id_plan">
            <th mat-header-cell *matHeaderCellDef class="text-center"> ID Plan </th>
            <td mat-cell *matCellDef="let element" class="text-center"> {{element.id_plan}} </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef > Nombre Plan </th>
            <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
        </ng-container>
        <ng-container matColumnDef="CEB">
            <th mat-header-cell *matHeaderCellDef  class="text-center">Com Ent Bco</th>
            <td mat-cell *matCellDef="let element" class="text-center"> {{element.comision_ent_banco||0.00}} </td>
        </ng-container>
        <ng-container matColumnDef="CSB">
            <th mat-header-cell *matHeaderCellDef class="text-center" >Com Sal Bco</th>
            <td mat-cell *matCellDef="let element" class="text-center"> {{element.comision_sal_banco||0.00}} </td>
        </ng-container>
        <ng-container matColumnDef="CSOB">
            <th mat-header-cell *matHeaderCellDef class="text-center" >Com Sal Otro Bco</th>
            <td mat-cell *matCellDef="let element" class="text-center"> {{element.comision_sal_otro_banco||0.00}} </td>
        </ng-container>
        <ng-container matColumnDef="CXP">
            <th mat-header-cell *matHeaderCellDef  class="text-center">Com XP</th>
            <td mat-cell *matCellDef="let element" class="text-center"> {{element.comision_xp||0.00}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onSelectRowClick(row)"></tr>
    </table>
</div>


<mat-paginator [length]="dataSource.total_registros" [pageSize]="dataSource.registros_x_pagina" 
[nextPageLabel]="'Siguiente'"
(page)="onPageChange($event)"
*ngIf="dataSource.results"></mat-paginator>

<div class="botonera d-none">
    <button (click)="onAceptClick()">Cerrar</button>
    <button mat-button color="primary" (click)="buscar()">Buscar</button>
</div>


<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
