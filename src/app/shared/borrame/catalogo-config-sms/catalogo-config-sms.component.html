<p>{{data.titulo}}</p>

<div [formGroup]="form">
    <div class="container" >
        <div class="row px-3">
            <div class="col-12 col-md-6 p-1">
                <mat-form-field appearance="fill" class="w-100">
                    <mat-label>Nombre</mat-label>
                    <input #query type="text" matInput placeholder="Nombre"formControlName="nombre" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class="col-12 col-md-6 p-1">
                <mat-form-field appearance="fill" class="w-100">
                    <mat-label>Código del servicio</mat-label>
                    <input type="text" matInput placeholder="Nombre"formControlName="serviciocod" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
        </div>
    </div>
</div>
<div class="botonera">
    <button (click)="onAceptClick()"> <mat-icon>close</mat-icon> Cerrar</button>
    <button mat-button color="primary" (click)="buscar()"> <mat-icon>search</mat-icon> Buscar</button>
</div>

<div #tableContainer class="container table-container multiple-buttons" >
    <table mat-table [dataSource]="dataSource.results" class="mat-elevation-z8" *ngIf="dataSource.results" >

        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef  class="">Nombre </th>
            <td mat-cell *matCellDef="let element" class=""> {{element.nombre}} </td>
        </ng-container>

        <ng-container matColumnDef="serviciocod">
            <th mat-header-cell *matHeaderCellDef >Código del servicio</th>
            <td mat-cell *matCellDef="let element"> {{element.serviciocod}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onSelectRowClick(row)"></tr>
    </table>
</div>

<mat-paginator [length]="dataSource.total_registros" [pageSize]="dataSource.registros_x_pagina" 
[nextPageLabel]="'Siguiente'"
(page)="onPageChange($event)"
*ngIf="dataSource.results"></mat-paginator>

<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
