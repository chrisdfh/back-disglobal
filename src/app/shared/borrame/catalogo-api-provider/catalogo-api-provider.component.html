<p>{{data.titulo}}</p>

<div [formGroup]="form">
    <div class="container" >
        <div class="row px-2">
            <div class=" col-6 p-1">
                <mat-form-field>
                    <mat-label>
                        Nombre Comercial
                    </mat-label>
                    <input matInput #input placeholder="Ej. Proveedor 123 C.A." formControlName="provnombre" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class=" col-6 p-1">
                <mat-form-field appearance="fill" class="w-100">
                    <mat-label>Código Proveedor</mat-label>
                    <input type="text" matInput placeholder="Ej. prov123"  formControlName="provcod" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
        </div>
    </div>
</div>

<div class="botonera">
    <button (click)="onAceptClick()"> <mat-icon>close</mat-icon> Cerrar</button>
    <button mat-button color="primary" (click)="buscar()"> <mat-icon>search</mat-icon> Buscar</button>
</div>


<div #tableContainer class="container table-container multiple-buttons" >
    <table mat-table [dataSource]="dataSource.results" class="mat-elevation-z8" *ngIf="dataSource.results" >

        <ng-container matColumnDef="provcod">
            <th mat-header-cell *matHeaderCellDef> Código </th>
            <td mat-cell *matCellDef="let element"> {{element.provcod}} </td>
        </ng-container>
        <ng-container matColumnDef="provnombre">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let element"> {{element.provnombre}} </td>
        </ng-container>
        <ng-container matColumnDef="descripcion">
            <th mat-header-cell *matHeaderCellDef > Descripción</th>
            <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onSelectRowClick(row)"></tr>
    </table>
</div>


<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
