<p>{{data.titulo}}</p>

<div [formGroup]="form">
    <div class="container" >
        <div class="row px-2">
            <div class=" col-6 col-md-3 p-1">
                <mat-form-field appearance="fill" class="w-100">
                    <mat-label>Nro. Aliado</mat-label>
                    <input type="number" matInput placeholder="1234"  formControlName="nroaliado" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class=" col-6 col-md-3 p-1">
                <mat-form-field [formGroupName]="'persona'">
                    <mat-label>
                        Nombre Comercial
                    </mat-label>
                    <input matInput #inputAliado placeholder="Ej. Supermercado 2000" formControlName="nombrecorto" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class=" col-6 col-md-3 p-1">
                <mat-form-field [formGroupName]="'persona'">
                    <mat-label>
                        Razón Social
                    </mat-label>
                    <input matInput placeholder="Ej. Importadora 2021" formControlName="nombrecompleto" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class=" col-6 col-md-3 p-1">
                <mat-form-field>
                    <mat-label>
                        Alias
                    </mat-label>
                    <input matInput placeholder="Ej. supermercado" formControlName="alias" (keyUp.enter)="buscar()">
                </mat-form-field>
            </div>
            <div class=" col-6 col-md-3 p-1 d-none">
                <mat-form-field class="w-100">
                    <mat-label>
                        Categoría
                    </mat-label>
                    <mat-select formControlName="categoriacod">
                        <mat-option>Todas</mat-option>
                        <mat-option *ngFor="let categoria of tablasApoyo.categoria" [value]="categoria.cod">
                            {{categoria.nombre}}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
        </div>
    </div>
</div>

<div class="botonera">
    <button (click)="onAceptClick()"> <mat-icon>close</mat-icon> Cerrar</button>
    <button mat-button color="primary" (click)="buscar()"> <mat-icon>search</mat-icon> Buscar</button>
</div>


<div #tableContainer class="container table-container multiple-buttons" >
    <table mat-table [dataSource]="dataSource.results" class="mat-elevation-z8" *ngIf="dataSource.results" >

        <ng-container matColumnDef="nombrecorto">
            <th mat-header-cell *matHeaderCellDef> Nombre Comercial </th>
            <td mat-cell *matCellDef="let element"> {{element.persona.nombrecorto}} </td>
        </ng-container>
        <ng-container matColumnDef="nombrecompleto">
            <th mat-header-cell *matHeaderCellDef> Razón Social </th>
            <td mat-cell *matCellDef="let element"> {{element.persona.nombrecompleto}} </td>
        </ng-container>
        <ng-container matColumnDef="nroaliado">
            <th mat-header-cell *matHeaderCellDef class="text-center"> Nro. </th>
            <td mat-cell *matCellDef="let element" class="text-center"> {{element.nroaliado}} </td>
        </ng-container>
        <ng-container matColumnDef="alias">
            <th mat-header-cell *matHeaderCellDef> Alias </th>
            <td mat-cell *matCellDef="let element"> {{element.alias}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onSelectRowClick(row)"></tr>
    </table>
</div>


<mat-paginator [length]="dataSource.total_registros" [pageSize]="dataSource.registros_x_pagina" 
[nextPageLabel]="'Siguiente'"
(page)="onPageChange($event)"
*ngIf="dataSource.results"></mat-paginator>

<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
