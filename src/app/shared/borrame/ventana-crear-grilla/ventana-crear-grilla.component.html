        <div class="col-12">
            <mat-form-field class="w-100">
                <mat-label>
                    Rango de fechas (Hacer click 2 veces)
                </mat-label>

                <mat-date-range-input [rangePicker]="picker">
                    <input matStartDate formControlName="fecha_desde" placeholder="Fecha Inicial">
                    <input matEndDate formControlName="fecha_hasta" placeholder="Fecha Final">
                </mat-date-range-input>
                <mat-hint>DD/MM/AAAA – DD/MM/AAAA</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>

<div class="container btn-container">
    <div class="row px-4">
        <div class="col-6 px-1">
            <button class="w-100 btn-standard fix-icon" mat-dialog-close>
                <mat-icon>close</mat-icon>
                Cerrar
            </button>
        </div>
        <div class="col-6 px-1">
            <button class="w-100 btn-standard fix-icon" mat-button color="primary" (click)="creaGrilla()">
                <mat-icon>add_circle</mat-icon>
                Crear
            </button>
        </div>
    </div>
</div>
<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
