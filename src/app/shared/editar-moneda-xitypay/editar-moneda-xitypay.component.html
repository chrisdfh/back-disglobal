<p class="mb-0">{{data.titulo}}</p>

<div class="container h-sp"  [formGroup]="form">
    <div class="row h-100 gap-1">
        <div class="col-12">
            <div class="msg pt-4">
                {{data.msg}}
            </div>
        </div>
        <div class="col-6 mb-1 pr-1">
            <mat-form-field class="w-100">
                <mat-label>
                    Nombre de la moneda
                </mat-label>
                <input #inputQuery matInput type="text" placeholder="Dólar" formControlName="nombre" (keyUp.enter)="returnModMomeda()">
            </mat-form-field>
        </div>
        <div class="col-6 mb-1 pl-1">
            <mat-form-field class="w-100">
                <mat-label>
                    Código de la moneda
                </mat-label>
                <input  matInput type="text" placeholder="USD" formControlName="moneda"  (keyUp.enter)="returnModMomeda()">
            </mat-form-field>
        </div>
        <div class="col-12 mb-1">
            <mat-form-field class="w-100">
                <mat-label>
                    Tasa / Bs
                </mat-label>
                <input  matInput type="number" placeholder="0.00" formControlName="tasa_ves"  (keyUp.enter)="returnModMomeda()">
            </mat-form-field>
        </div>
        <div class="col-12 mb-1">
            <mat-form-field>
                <mat-label>
                    Fecha
                </mat-label>
                <input #participacion matInput type="text" placeholder="10" formControlName="fecha" readonly (keyUp.enter)="returnModMomeda()">
            </mat-form-field>
        </div>
        <div class="col-12">
            <mat-slide-toggle class="mb-1" formControlName="activo">
                Activo
            </mat-slide-toggle>
        </div>
             
        <div class="col-12">
            <!-- mat-dialog-actions -->
            <div class="botonera border-top border-opacity-10"> 
                <button type="button" class="btn" mat-button #btnTrue (click)="returnModMomeda()">{{data.btn_true_text}}</button>
                <button type="button" class="btn" mat-button [mat-dialog-close]="false" #btnFalse>{{data.btn_false_text||'Cancelar'}}</button>
            </div>
        </div>
    </div>
</div>

<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
