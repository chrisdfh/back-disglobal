<h2 #top class="mt-3">
    Proveedor API <span *ngIf="this.modo !== ''" >- {{this.modo}}</span>
</h2>
<app-crud-bar (accion)="getAction($event)" [crud]="crud"></app-crud-bar>
<div #main class="container">
    <div class="pb-4" [formGroup]="form">
        <small>Campos marcados con (*) son requeridos</small>

        <div class="row pt-4">
            <div class="col-md-6 p-0">
                <mat-form-field class="w-100" appearance="fill">
                    <mat-label>Nombre de Proveedor</mat-label>
                    <input matInput placeholder="Ej. Tecnológica 123 C.A." formControlName="provnombre">
                </mat-form-field>
            </div>
            <div class="col-md-6 p-0">
                <mat-form-field class="w-100" appearance="fill">
                    <mat-label>Código de Proveedor</mat-label>
                    <input matInput placeholder="Ej. tec123" formControlName="provcod" [readonly]="modo !== 'Incluir'">
                </mat-form-field>
            </div>
            <div class="col-md-12 p-0">
                <mat-form-field class="w-100" appearance="fill">
                    <mat-label>Descripción</mat-label>
                    <input matInput placeholder="Ej. Compañía de Tecnología 123" formControlName="descripcion">
                </mat-form-field>
            </div>

            
            <div class="col-md-8 p-0">
                <mat-form-field class="w-100" appearance="fill">
                    <mat-label>URL API</mat-label>
                    <input type="url" matInput placeholder="Ej. https://www.tec123.com/api/v1" formControlName="url_dom">
                </mat-form-field>
            </div>
            <div class="col-md-4 p-0">
                <mat-form-field class="w-100" appearance="fill">
                    <mat-label>Puerto API</mat-label>
                    <input type="text" inputmode="numeric" matInput placeholder="Ej. 8123" formControlName="puerto">
                </mat-form-field>
            </div>
        </div>
    </div>
</div>



<app-crud-bar (accion)="getAction($event)" [crud]="crud"></app-crud-bar>

<div class="spinner-container" *ngIf="showSpinner" >
    <mat-spinner color="warn"></mat-spinner>
</div>
