

<div class="row pt-4 pb-2">
    <div class="col-12">
        <h2 class="text-center">
            Monedas Por Cuenta en XityPay
        </h2>
    </div>
</div>
<div class="botonera-seleccion-usuario flex-wrap">
    <button type="button" mat-button color="primary" (click)="catalogoXpayCta()">Seleccionar Aliado</button>
    <button type="button" mat-button color="primary" (click)="catalogoMonedas()">Agregar Moneda a Cuenta</button>
    <button type="button" mat-button color="primary"[routerLink]="'/monedas'">Gestionar Monedas</button>
</div>

<div class="container pt-2">
    <div class="row">
        <div class="col-md-8 col-12 offset-md-2">
            <div class="info-text">
                Seleccione un aliado para gestionar las monedas asociadas a su cuenta
            </div>
        </div>
    </div>
</div>

<div class="container pt-2 pb-3" #top>
    
<div class="text-center" *ngIf="xpaycta.xpayctanro; else noxpaycta">
    <h3>
        {{xpaycta.xpayctanro}} - {{xpaycta.nombrecorto}}
    </h3>
</div>

    <ng-template #noxpaycta>
        <div class="text-center">
            <h4>Seleccione un aliado</h4>
        </div>
    </ng-template>


    <div #tableContainer class="container table-container mb-5">
    <table mat-table [dataSource]="dataSource.results" class="mat-elevation-z8 table-fixed"  *ngIf="dataSource.results && xpaycta.xpayctanro;else noDataSource" >

        <ng-container matColumnDef="moneda" >
            <th mat-header-cell *matHeaderCellDef class="d-noe d-md-table-cell">Código</th>
            <td mat-cell *matCellDef="let element" class="d-noe d-md-table-cell">
                {{element.moneda}}
            </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef class="w-60p">Nombre</th>
            <td  mat-cell *matCellDef="let element" class="w-60p">{{element.nombre}}</td>
        </ng-container>

        <ng-container matColumnDef="valor">
            <th mat-header-cell *matHeaderCellDef class="w-25">Valor en Bs.</th>
            <td  mat-cell *matCellDef="let element" class="w-25">{{element.tasa_ves}}</td>
        </ng-container>

        <ng-container matColumnDef="activo">
            <th class="text-center d-nne d-md-table-cell" mat-header-cell *matHeaderCellDef>Activo</th>
            <td class="text-center d-nne d-md-table-cell" mat-cell *matCellDef="let element">

            <mat-slide-toggle class="mb-1" [ngClass]="element.activo" [checked]="element.activo==='S'" disabled>
            </mat-slide-toggle>
            </td>
        </ng-container>

        <ng-container matColumnDef="boton">
            <th mat-header-cell *matHeaderCellDef  class="w-100"></th>
            <td mat-cell *matCellDef="let element" class="w-100">
                <mat-icon (click)="removeMonedaDeCuenta(element)">delete</mat-icon>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <ng-template #noDataSource>
        <h5>No hay registros</h5>
    </ng-template>
</div>
<div class="col-12">
    <mat-paginator [length]="dataSource.total_registros" [pageSize]="dataSource.registros_x_pagina" 
        [nextPageLabel]="'Siguiente'"
        [pageSizeOptions]="[15, 25, 50, 100]"
        (page)="onPageChange($event)"
        *ngIf="dataSource.results">
    </mat-paginator>
</div>
</div>

<div class="spinner-container" *ngIf="showSpinner">
    <mat-spinner color="warn"></mat-spinner>
</div>
